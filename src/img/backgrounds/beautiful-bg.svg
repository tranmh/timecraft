<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <radialGradient id="g1" cx="20%" cy="30%">
      <stop offset="0%" stop-color="#4a2040" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2d1b2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%">
      <stop offset="0%" stop-color="#3d2040" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2d1b2e" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#2d1b2e"/>
  <rect width="100%" height="100%" fill="url(#g1)"/>
  <rect width="100%" height="100%" fill="url(#g2)"/>
  <circle cx="100" cy="120" r="150" fill="rgba(80,40,60,0.15)"/>
  <circle cx="320" cy="300" r="120" fill="rgba(60,30,50,0.12)"/>
</svg>
