<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <pattern id="circuit" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 0 25 H 20 M 25 0 V 20 M 30 25 H 50 M 25 30 V 50" fill="none" stroke="rgba(0,255,65,0.04)" stroke-width="0.5"/>
      <circle cx="25" cy="25" r="2" fill="none" stroke="rgba(0,255,65,0.06)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="1" fill="rgba(0,255,65,0.05)"/>
      <circle cx="50" cy="50" r="1" fill="rgba(0,255,65,0.05)"/>
    </pattern>
    <pattern id="scanline" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="rgba(0,255,65,0.02)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#0a0a0a"/>
